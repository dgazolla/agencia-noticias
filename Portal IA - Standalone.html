document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lor:'#16a39a', label:'Estágio e talentos', desc:'Atrai jovens qualificados para os novos perfis da indústria.' },\n      ],\n    },\n    {\n      chip:'Tornar a fábrica mais sustentável',\n      q:'Como tornar minha indústria mais sustentável e eficiente no uso da água?',\n      keys:['água','agua','reúso','reuso','carbono','descarbon','sustent','esg','energia','hídr','hidr','ambient','clima','emiss','renov'],\n      answer:'A pauta de sustentabilidade lidera a cobertura da semana, com a indústria propondo um marco para o reúso de água e avançando na descarbonização. O SENAI oferece consultoria e tecnologia em gestão hídrica e eficiência energética, enquanto a CNI disponibiliza dados de consumo por setor para orientar metas.',\n      sources:[\n        { cat:'SUSTENTABILIDADE', t:'Indústria propõe regulamentação do reúso de água' },\n        { cat:'REPORTAGENS', t:'Descarbonização em cena: indústrias intensivas em energia' },\n      ],\n      services:[\n        { brand:'SENAI', color:'#f07d00', label:'Soluções em gestão hídrica', desc:'Consultoria e tecnologia para reúso e eficiência da água.' },\n        { brand:'SENAI', color:'#f07d00', label:'Institutos de Inovação', desc:'P&D em tratamento de efluentes e energia limpa.' },\n        { brand:'CNI', color:'#0096d6', label:'Estatísticas & Sondagem', desc:'Indicadores de água e energia por setor industrial.' },\n      ],\n    },\n    {\n      chip:'Desenvolver lideranças e sucessão',\n      q:'Como desenvolver novas lideranças para a minha indústria?',\n      keys:['líder','lider','gestão','gestao','sucess','dirigent','executiv','governan','mentor','carreira','chefe','direção','direcao'],\n      answer:'A renovação no comando das federações coloca a formação de lideranças em destaque. O IEL atua exatamente nesse ponto, com a Academia de Líderes — formação executiva para dirigentes e sucessores — além de programas de mentoria e desenvolvimento de gestão.',\n      sources:[\n        { cat:'INSTITUCIONAL', t:'Novos líderes assumem federações estaduais da indústria em 2026' },\n        { cat:'ENTREVISTAS', t:'O que esperar da nova geração de dirigentes industriais' },\n      ],\n      services:[\n        { brand:'IEL', color:'#16a39a', label:'Academia de Líderes', desc:'Formação executiva para dirigentes e sucessores.' },\n        { brand:'IEL', color:'#16a39a', label:'Mentoria & Sucessão', desc:'Desenvolvimento estruturado de novas lideranças.' },\n        { brand:'IEL', color:'#16a39a', label:'Consultoria em gestão', desc:'Apoio à governança e profissionalização da empresa.' },\n      ],\n    },\n    {\n      chip:'Contratar estagiários e talentos',\n      q:'Como atrair estagiários e novos talentos para a indústria?',\n      keys:['estág','estag','jovem','aprendiz','contrat','talento','vaga','recrut','trainee','universit','rh '],\n      answer:'O IEL conecta estudantes e empresas: são milhares de vagas de estágio abertas em todo o país, além de programas de jovem aprendiz e da ponte universidade–empresa. Para formar esses talentos, o SENAI complementa com cursos técnicos e qualificação.',\n      sources:[\n        { cat:'EDUCAÇÃO', t:'IEL abre 2,3 mil vagas de estágio em todo o país' },\n        { cat:'EDUCAÇÃO', t:'Prêmio IEL 2026 abre inscrições para projetos de inovação' },\n      ],\n      services:[\n        { brand:'IEL', color:'#16a39a', label:'Estágio', desc:'Recrutamento e gestão de estagiários em todo o país.' },\n        { brand:'IEL', color:'#16a39a', label:'Jovem Aprendiz', desc:'Programa de aprendizagem alinhado à legislação.' },\n        { brand:'SENAI', color:'#f07d00', label:'Educação Profissional', desc:'Formação técnica para os perfis que faltam.' },\n      ],\n    },\n  ];\n\n  DEFAULT = {\n    answer:'Posso ajudar com base nas notícias do portal e indicar os serviços certos do Sistema Indústria. De forma geral: a CNI atua em representação, dados e competitividade; o SENAI em educação profissional e tecnologia; o SESI em saúde e segurança; e o IEL em talentos, estágio e gestão. Explore o catálogo para encontrar a solução ideal.',\n    sources:[\n      { cat:'POSICIONAMENTOS', t:'CNI define prioridades estratégicas para a indústria' },\n      { cat:'EDUCAÇÃO', t:'SENAI e Cisco lançam curso de redes para a indústria 4.0' },\n    ],\n    services:[\n      { brand:'CNI', color:'#0096d6', label:'Estatísticas & Sondagem', desc:'Dados e indicadores para decisões na indústria.' },\n      { brand:'SENAI', color:'#f07d00', label:'Educação Profissional', desc:'Cursos técnicos, EAD e qualificação.' },\n      { brand:'IEL', color:'#16a39a', label:'Consultoria empresarial', desc:'Apoio à gestão, inovação e talentos.' },\n    ],\n  };\n\n  match(q) {\n    q = (q || '').toLowerCase();\n    let best = null, score = 0;\n    for (const t of this.TOPICS) {\n      let s = 0;\n      for (const k of t.keys) if (q.indexOf(k) >= 0) s++;\n      if (s > score) { score = s; best = t; }\n    }\n    return best || this.DEFAULT;\n  }\n\n  askTopic(t) { this.setState({ ask: { query: t.q, topic: t }, input: '', aiText: null, loading: false }); }\n\n  doAsk(text) {\n    const q = (text || '').trim();\n    if (!q) return;\n    const t = this.match(q);\n    const useAI = t === this.DEFAULT && window.claude && window.claude.complete;\n    this.setState({ ask: { query: q, topic: t }, input: '', aiText: null, loading: !!useAI });\n    if (useAI) {\n      const prompt = 'Você é o assistente do portal de notícias do Sistema Indústria (CNI, SESI, SENAI, IEL). Em no máximo 3 frases e em português, responda à pergunta abaixo e, quando fizer sentido, relacione com serviços do Sistema Indústria. Pergunta: ' + q;\n      window.claude.complete(prompt)\n        .then(r => { if (this.state.ask && this.state.ask.query === q) this.setState({ aiText: (r || '').trim(), loading: false }); })\n        .catch(() => this.setState({ loading: false }));\n    }\n  }\n\n  renderVals() {\n    const colorFor = d => d === 'up' ? '#1f9d57' : d === 'down' ? '#d23f31' : '#8a94a0';\n    const arrowFor = d => d === 'up' ? '↑' : d === 'down' ? '↓' : '→';\n    const src = this.state.mode === 'tema' ? this.THERMO_TEMA : this.THERMO_REGIAO;\n    const thermoBars = src.map(b => ({ t: b.t, v: b.v, delta: b.delta, width: b.v + '%', color: colorFor(b.dir), arrow: arrowFor(b.dir) }));\n\n    const onBtn = 'padding:9px 16px;font-size:13px;font-weight:700;font-family:inherit;border:none;cursor:pointer;background:#0b1f44;color:#fff';\n    const offBtn = 'padding:9px 16px;font-size:13px;font-weight:600;font-family:inherit;border:none;cursor:pointer;background:#fff;color:#5a6470';\n\n    const tabs = this.NEWS.map((n, i) => {\n      const active = i === this.state.sel;\n      return {\n        cat: n.cat, title: n.title,\n        catColor: active ? '#0096d6' : '#8a94a0',\n        titleColor: active ? '#16335f' : '#3a4048',\n        style: 'cursor:pointer;padding:14px 16px;border-radius:8px;border:1px solid ' + (active ? '#0096d6' : '#e6eaef') + ';background:' + (active ? '#f2f9fd' : '#fff') + ';transition:all .15s',\n        onClick: () => this.setState({ sel: i }),\n      };\n    });\n\n    const ask = this.state.ask || { query: this.TOPICS[0].q, topic: this.TOPICS[0] };\n    const topic = ask.topic;\n    const ansText = this.state.loading\n      ? '⋯ Consultando as notícias do portal…'\n      : ((topic === this.DEFAULT && this.state.aiText) ? this.state.aiText : topic.answer);\n    const chips = this.TOPICS.map(t => ({ label: t.chip, onClick: () => this.askTopic(t) }));\n\n    return {\n      thermoBars,\n      setTema: () => this.setState({ mode: 'tema' }),\n      setRegiao: () => this.setState({ mode: 'regiao' }),\n      temaBtnStyle: this.state.mode === 'tema' ? onBtn : offBtn,\n      regiaoBtnStyle: this.state.mode === 'regiao' ? onBtn : offBtn,\n      tabs,\n      current: this.NEWS[this.state.sel],\n      open: this.state.open,\n      onToggle: () => this.setState({ open: !this.state.open }),\n      inputVal: this.state.input || '',\n      onInput: e => this.setState({ input: e.target.value }),\n      onKey: e => { if (e.key === 'Enter') this.doAsk(this.state.input); },\n      onAsk: () => this.doAsk(this.state.input),\n      chips,\n      query: ask.query,\n      ansText,\n      ansSources: topic.sources,\n      ansServices: topic.services.map(s => ({ ...s, url: this.CAT })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
